services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always

    environment:
      POSTGRES_DB: timesheet
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d timesheet"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - app-network

  backend:
    build: ./backend
    container_name: backend
    restart: always

    ports:
      - "5001:5001"

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
