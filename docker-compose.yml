services:
  # legacy mssql code (kept for rollback)
  # mssql:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   container_name: sqlserver
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     SA_PASSWORD: "Bilal@1122"
  #   ports:
  #     - "1433:1433"
  #   volumes:
  #     - mssql_data:/var/opt/mssql
  #   restart: always

  postgres:
    image: postgres:16
    container_name: postgres

    environment:
      POSTGRES_DB: timesheet
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d timesheet"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: always

  backend:
    build: ./backend
    container_name: backend

    ports:
      - "5001:5001"

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy

    restart: always

  frontend:
    build: ./frontend
    container_name: frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: always

volumes:
  postgres_data:
