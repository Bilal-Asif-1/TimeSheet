services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always

    environment:
      POSTGRES_DB: timesheet
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d timesheet"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - app-network

  backend:
    build: ./backend
    container_name: backend
    restart: always

    ports:
      - "5001:5001"

    env_file:
      - ./backend/.env

    # Overrides backend/.env for browser Origin / redirects. Set in repo-root `.env` or use defaults below.
    environment:
      CLIENT_URL: ${CLIENT_URL:-http://18.232.85.119}

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://18.232.85.119:5001}
        VITE_APP_ORIGIN: ${VITE_APP_ORIGIN:-http://18.232.85.119}
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-local-only}
    container_name: frontend
    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
