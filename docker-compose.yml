services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver

    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Bilal@1122

    ports:
      - "1433:1433"

    volumes:
      - mssql_data:/var/opt/mssql

    restart: always

  backend:
    build: ./backend
    container_name: backend

    ports:
      - "5001:5001"

    environment:
      - PORT=5001
      - NODE_ENV=development

      # DB
      - DB_SERVER=sqlserver
      - DB_PORT=1433
      - DB_NAME=TimesheetDB
      - DB_USER=sa
      - DB_PASSWORD=Bilal@1122

      # JWT
      - APP_JWT_SECRET=super-secure-dev-secret-change-in-production

      # Microsoft Auth
      - MS_CLIENT_ID=1ba6917a-f4c0-49ef-a189-7c57ffd79b50
      - MS_TENANT_ID=8adc908e-9241-4552-8c21-c31d7f578a69
      - MS_CLIENT_SECRET=ADD_YOUR_CLIENT_SECRET_HERE
      - MS_REDIRECT_URI=http://localhost:5001/auth/microsoft/callback

      # Frontend URL
      - CLIENT_URL=http://localhost:5173

    depends_on:
      - mssql

    restart: always

  frontend:
    build: ./frontend
    container_name: frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: always

volumes:
  mssql_data:
