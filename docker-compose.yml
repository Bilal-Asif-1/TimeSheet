services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Bilal@1122
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

    # ✅ CRITICAL: DB ready hone ka wait mechanism
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Bilal@1122 -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5001:5001"
    environment:
      - DB_USER=sa
      - DB_PASSWORD=Bilal@1122
      - DB_SERVER=mssql # ✅ correct hai (change mat karna)
      - DB_NAME=TimesheetDB
      - DB_PORT=1433

    # ✅ Ab backend tab start hoga jab DB healthy ho
    depends_on:
      mssql:
        condition: service_healthy

    restart: always # ✅ optional but strong safety net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mssql_data:
