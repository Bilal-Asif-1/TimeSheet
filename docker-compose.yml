services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Bilal@1122"

    ports:
      - "1433:1433"

    volumes:
      - mssql_data:/var/opt/mssql

    restart: always

  backend:
    build: ./backend
    container_name: backend

    ports:
      - "5001:5001"

    env_file:
      - ./backend/.env

    environment:
      DB_SERVER: sqlserver

    depends_on:
      - mssql

    restart: always

  frontend:
    build: ./frontend
    container_name: frontend

    ports:
      - "5173:80"

    depends_on:
      - backend

    restart: always

volumes:
  mssql_data:
